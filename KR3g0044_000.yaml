body:
  text: 玉管照神局術數類五命書相書之屬提要臣等謹案玉管照神局三卷舊本題南唐宋齊邱撰齊邱字超回改字子嵩廬陵人初以布衣事李忭授殿直軍判官擢右司員外郎纍遷同平章事兼知尚書省事李璟嗣立以太傅領劍南東川節度使封楚國公尋得罪被廢自經死齊邱生五季俶擾之世以權譎自喜尤好術數凡挾象緯青烏姑布壬遁之術居門下者常數十輩皆厚以資之是書專論相術疑即出其門下客所撰集而假齊邱名以行世者也宋史藝文志焦竑經籍志皆稱玉管照神局二卷其名與此本同陳振孫書録解題則稱玉管照神而無局字且僅有一卷疑所見本非完帙吳任臣十國春秋則載齊邱有玉管照神經十卷名目稍異而卷數亦與宋志不符錢曽讀書敏求記所載與十國春秋相合且稱上局所論皆人之體貌有形可見故謂之陽局下局所論皆出形之外無象可觀故謂之陰局其言體例甚悉此本為永樂大典所載大指皆以形狀立論與錢氏所云有隂陽二局者不符疑此本即宋志所稱之二卷故與十卷之本多所同異歟術家之書為後人緣飾增損彼此抵牾往往如此不足深詰特以其議論頗為精析而所取各書尤多世所未覩猶屬相傳舊文故稍加訂正釐為三卷録備一家焉乾隆四十六年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:874b084c1add9c27dfa0f70d3ad08a5088c9d8e20f66e05956eaea60ea4d109c
