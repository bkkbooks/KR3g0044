body:
  text: 玉管照神局卷下體骨骨滑肉中秀端然體更隆清竒兼聳直應是作三公骨乃人根本須還秀更清若還粗更澀豈解獲功名骨細皮膚滑青綱不繞身自然身富貴早嵗入科名手骨欹還賤龍吞虎必榮纎纎十指細相見使人驚惡骨應斜側身寒體不平虎強龍又弱何足望身榮與月波洞中記同歌訣曰神形中有妙心相兩無餘百一歌中意君還會此無形氣大夫欲其剛正其氣欲剛其性欲正剛則不佞正則不邪得剛正之氣為天下之英才或有金木水火土之氣或鳥獸蟲魚之形蓋人貌不同取類非一也詩云形有隂陽各有宜剛則屬陽柔則屬隂元來形相類相隨神足過形為貴相形過神者賤無疑形者神之合形不得有餘神不得不足形有餘者為賤神不足者早死也大抵人形不要偏堂堂丰貌便朝天輕浮躁薄貧且賤不爾中途便夭年人稟隂陽氣形多像五行木形長瘦挺直木不得肥肥則貧而無夀金形方而正水形潤而肥土形重肥而背厚火形赤而上尖下濶正則不破及得五形之正為英氣也或水火相傷金木相犯皆為不合相也雷霆須震響日月要分明龍虎為時瑞鸞鳯作世英人之形或如攫虎騰龍翔鸞逸鳯伏龜遊鴈攀猿坐猴回牛躍馬狻猊舞燕搏鷹望鶴之類皆貴相也大凡物有萬狀人有萬狀不可以一言盡不可以一字徴惟有識者細察之豬蛇并鼠狗貧薄自無成豬無夀蛇性毒狗分憂鼠多疑能取其象而定理性無不中矣七局形色貴富夀賤貧夭刑金眉聳聲潤口方色紫耳大氣清眉低神癡小口骨粗耳反肉慢露齒結喉木目秀聲重下朝色紅唇厚氣重目昏神驚下項骨寒唇縮肉枯眉鋒逆鬚水耳白聲長頥平色黃眼長氣長耳黑神醉頥側骨沉眼慢肉薄凖尖鼻折火唇紅聲圓背厚色烈鼻大氣慢唇白神慢無背骨重鼻掀肉滿耳薄頸喎土凖圓聲清肉豐色快眉長氣舒凖尖神馳肉疾骨露眉逆肉橫斜視赤睛獅形夫獅形者頭方額闊腦後有插山骨起天庭突起眉濃眼白睛黑圓滿而大山根斷口濶鬚鬢頰髙難知心腹之人也入此相者位至節察列土侯王主夀女人入此相者為國母似者天下大富有出林獅子有勢鎮宅獅子多財坐山獅子多淳香獅子主間畫獅子無威戲獅子多欲承屏風獅子主從案主從字未解卧獅子多懶詩曰威振山河佐主忠頭方額髙更眉濃腦後骨起天庭突列土分茅爵纍封麟形夫麟形者頭方額濶頂骨髙身形仰耳髙眼深眉粗口濶音中宫商行中規矩得麟形真者皆主大貴女人入此相者為后妃像者赤手有錢詩曰額廣眉粗腮頷橫耳髙齊厚黑睛平身形髙仰威雄勢佐國升平獨秉君白虎形夫白虎形者身細長眼赤長眉與眼齊鼻直口大唇齊齒粗白頭短圓額長方厚印堂五嶽皆起手長步大行坐身曲前向語聲如雷凡欲語則眉眼光起威猛看人侣作怒色入此相者為將軍有列土侯王之分女人入此相者為夫人似者富貴詩曰貌聳精神猛虎威眼長眉秀凖頭垂強謀妙將橫天下百萬雄師獨秉持象形夫象形者天中天庭起印平眉細眼長五總龜作眼單而尾垂鼻仰牙露五總龜云牙露鈍慢身形大多不睡入正形者作公卿主夀詩曰枕上明珠額光平身形長厚美三停行粗坐穩言深重逺鎮山河協聖明御象詩曰象形有三種御象最髙強公私多髙貴只是少兒郎立象詩曰立象衣食足性慢不多忙為人多好善夀命主延長行象詩曰行象多辛苦驅馳無了時家活如星散臨終亦少兒犀形夫犀形者頭圓天庭髙伏犀骨起天地相朝上下三停一體肥眉如陳雲眼大無輔入正形者乃貴人而為大臣詩曰頭圓眼大更眉濃耳內毫毛體肉豐若得正形臺鼎位其他人福夀而終詩曰出水犀形止正郎生來清貴坐朝堂金銀財帛多藏畜夀限須期八十亡猿形夫猿形者面圓而小眉目俱圓臂長音響好潔淨修􅎖喜花果性溫克而急義却常與貴人交接五總龜云常得貴人提携主夀祿自有等第其形有七詩曰頭圓眼黑頷腮平腳短手長行走輕去在煙霄間散處一生止是主虛名墜枝猿詩曰墜枝猿尊重平生急性靈任他人説惡怨恨實無聲攀枝猿詩曰攀枝猿辛苦終身不自由運逢四十七老後却無憂立枝猿詩曰立枝猿獨自望空哭爺娘孤然無兄弟後代少兒郎家猿詩曰家猿人最貴論情不可陳面連三斷細位極至王臣坐猿詩曰坐猿衣食足語話愛身搖言詞多吉慶主事自優遊走猿詩曰走猿今日苦田園盡屬他為人不尊重一生走波波藏猿詩曰藏猿節察位居官衣食豐九卿并御史佐國近三公玄武形夫玄武形者頭小而長額方而大天庭小尖耳垂下大上小嶽瀆相應口小方唇紫齒細白頭仰步濶色常光潤入正形者位至公卿有女人入此相者為后妃似者主富詩曰額小頭尖體帶肥四枝尖細厚腮頥雖然位徹公卿上爭奈臨終在路岐黿形夫黿形者形小瘦則清白肥大則紫黑身形行緊頭偏而性急言清目黑白一般看人光耀鼻髙尖人中濶入此形者主為官髙貴僧道最宜俗人多富仍須好道裝亦主夀詩曰額起眉濃凖帶尖唇紅溫潤令多嚴腮頥垂滿言清朗上節將軍心性亷龜形夫龜形者頭大頂突鼻聳眉濃眼濶方有輪情性淳好山水五嶽相近多尊重背厚體肥康寧福夀位至卿相詩曰額起頭髙鼻聳齊眉濃眼大厚腮頥匱倉豐滿精神異富夀兼全佐主威蛇形夫蛇形者面長五嶽不齊額眉小眼長而無輪角黑少白多肉色常有青口濶唇長尖有鎌鋩色青齒細而疏白耳上大下小鼻小長尖行腰軟頭仰胸髙入正形者位至五品且不善終女人入此相者少貴而淫像者主富詩與五總龜內同馬形夫馬形者而長眼大口濶而髙齒大而疏行坐尊重性慢腰長詩曰頭圓額短眼眶圓鼻聳眼髙髭髮全語惠性髙為事幹義深終秉殺生權豹形夫豹形者頭方額濶眉濃目大圓睛露白五嶽起天倉窄地閣圓口露方齒而密入正形者為將軍刺史好殺中夀詩曰眉細眼圓五嶽豐頷腮橫起志英雄耳輪貼肉能剛勇敵塞名髙定老戎兔形夫兔形者頭小額尖起眼小眉細睛青白少黑多口小而方齒青而細密唇青有鎌鋩耳小而聳鼻細白而紅入正形者位至五品女人入相者為貴妃詩曰額尖眉細口微方耳聳唇紅信義良三十年前成又敗文髙無比位星郎山羊形夫山羊形者頭方額突起五嶽不起眉細黃眼如覆月黑少白多睛濁髮黃髭清心愛隂謀入正形者位至列土好殺女人入此相者雖富而淫熊形夫熊形者額濶後狹鼻聳口濶唇髙齒黑參差地閣橫起手足肥厚肩膞厚步速入正形者將軍之位好殺像者主富詩曰頭長前短眼微深黑白分明美稱心手足厚豐行步慢寰中雄猛性深沉猩猩形夫猩猩形者眉目相近鼻髙直口濶上唇牽面橫濶無嶽骨身橫肥髮粗大腮頥垂多語笑性急言直行慢步髙入此相者為名僧不然清髙道士若是俗人官至五品主夀女人入此相者大賢婦也詩曰頭平額廣面粗圓嶽上毫濃髮又旋言急語清懷大志藝髙財富有雙全野狸形夫野狸形者頭短圓額方小眉細而長眼小而竪黑白不分鼻小直人中淺口角垂面仰骨髙臂起步急腮頥垂聲小肉色紫黑入此相者位至刺史詩曰口濶唇髙耳暈垂額方頭短面橫肥言髙性直行胸仰終秉山河定逺危須知此形毒兄弟不調和離鄉家萬里事業已消磨駱駝形夫駱駝形者頭長額濶平項長五嶽不正眉毛粗濃目圓而深夀上低凖齊口聚毛髮粗少腰曲行緩膞濶手腳長語慢骨粗行走須伸頭低入此形者為朝官女人似者為妾詩曰眉細睛髙嶽盡流口方唇淡性多柔聲雄行慢心難測佐主功髙不到頭鹿形夫鹿形者額廣鼻凖髙晴青黑而微長耳露五嶽髙身小行慢地閣薄腮不垂腳手細長頭有肉角兼骨入此相者位至公卿像者主夀詩曰頭長五嶽位皆髙額廣眉長意氣傲文武雙全官極品寰中內外恣雄豪狗形夫狗形者其形身與腳相等睛黃頭項粗面尖性急飲食無厭小人多憎惡於人有心力入此相者為卿相女人入相為夫人有權柄詩曰面尖額濶眼睛黃喜怒平生自不常指示得逢蕭相國一生心力佐髙皇驢形夫驢形者其形頭濶平無腦骨眉小眼大睛青黃白無和氣行步急多妄談性卑汚面長耳長語音粗散入此相者主貴詩曰眼中黃白面形長耳大分明相異常貴兆已成真大貴不然稱賞動君王帝嘗謂李忠臣曰卿耳大貴兆對曰龍耳小驢耳大五總龜同麞形夫麞形者耳下濶身無肚頭圓眼粗稜髙面長額平骸尖肉色青肩膞狹語髙性急入此相者位至佐國女人入此相為夫人詩曰眉短晴青凖帶肥唇髙齒大厚腮頥語粗言急性難測同秉山河有操持鸞形夫鸞形者頭圓額短尖司馬起眉細短目深圓而小上半有角睛黃鼻小曲口小方唇紅濕齒細白面小圓五嶽起腮頥垂耳小有輪廓貼肉身形細肥行慢似舞語笑滋媚肉色細白性慢舉止低徊髭髮黑潤語聲清亮在衆中有異相得正形者位至上卿有忠信懷氣誼多女少男善終像此形者富貴有衣食女人入此相者主為妃后詩曰司馬微起眼光深語媚端容性亮沉榮祿須知三十後位崇妃后合天心一云卿相合天心朱雀形夫朱雀形者眼媚頭長額又方口唇丹起有鎌鋩身形起坐看端正秉節懷忠佐聖皇朱雀容貌狠終身主見歡行藏如鳯勢永作殿中官入此三相者為公卿一生榮貴有夀鸚鵡形夫鸚鵡形者頭長額方眉長眼細鼻聳凖圓口小唇長腮頥尖多語笑看人頭側心不甚好間入此形者位至殿官多財夀女人入此形者后妃相也詩曰額廣頭髙語笑多眉分目媚性調和一生清貴君王寵秉節懷忠斷佞訛籠中鸚鵡詩曰鸚鵡何言貴籠中鸚鵡強語言皆吉慶財帛足兒郎鶴形夫鶴形者其形倉庫陷眼毛垂身體弱頭骨粗頂細長行步濶一停長性溫柔好山水多名譽入正形者位至公卿主夀女人入此相者為后妃相似者向後富貴四部陷者孤鶴五部露者病鶴名賢相五總龜云鶴不必須要項長設如垂鶴蹲鶴等者豈見項也餘同前頂縮者睡鶴行步輕擺者衝天鶴容儀峭峻者名雙鶴詩曰額短頭圓頂後紅鼻梁尖聳性靈聰不惟佐主權生殺更出幽玄合上穹飛鶴詩曰飛鶴亦髙貴行而兩腳輕運須看九五定見坐琴廳雙鶴詩曰雙鶴多髙貴行而頭尾搖在私還富貴名位入清朝孤鶴詩曰孤鶴不禁老老後沒來由身軀無住處自死入荒丘立鶴詩曰立鶴身形瘦望食等將來為人雖氣槩大段沒錢財鷹形夫鷹形者頭方頂圓側目鼻曲眉薄口小行急耳卓常懷嫉妬性難捉摸為事猛浪入此形者上將軍好殺不善終詩曰額廣眉濃眼彩光腮垂頥重有連囊聲清步濶多雄猛解統兵威武事揚五總龜同燕形夫燕形者頭突起眉眼細媚長深面短肥腮頥垂步緩多語笑聲小亮入此相者主清明顯達位至五品女人入此形者富貴詩曰口小唇紅凖促圓形端體瘦藝雙全眼深黑白能明朗十五逢君立殿宣孔雀形夫孔雀形者頭方頂尖額廣眉目長而細竪無輪角鼻小尖聳直口方唇紫齒耳小竪五嶽起行慢似舞性沉語重笑有媚入正形者位至公卿有夀女人入此相者宫妃貞潔之婦也詩曰體秀行藏語媚端雙眸明媚衆人歡三停平等能和美官髙財足志多般鴿形夫鴿形者頭圓額尖平正眉前粗尾細目圓鼻紅身短步濶語笑多媚入此相者為殿中之官女人入此相者為宫妃似者主貴鵲形夫鵲形者面小青白色耳卓行步急談吐寬容人見多喜入此形者位至公卿女人入此相者主富貴詩曰面小形容白又青出言人盡喜聞聲胸中自有封侯印忠孝傳家表令名五總龜注云出張皓墮鵲事餘與上同石藴玉而山輝水懷珠而川媚此知精神之寶見乎色而發乎氣也夫形者質也氣所以形乎質也質因氣而宏神因質而安故質宏而氣寬神安則氣靜得喪不足以暴其氣喜怒不足以驚其神則於德為有容於量為有度乃重厚有福之人形猶材有杞梓楩楠荆棘之異神猶工所以治材而成其器聲猶器聽其聲知其器美惡氣猶馬馳之以適於善惡之境君子則善養其材善使其工善治其器善御其馬小人反是夫氣寬可以容物月波洞中記又云氣和可以接物氣剛可以制物氣清可以表物氣正可以理物不寬則隘不和則戾不剛則懦不清則濁不正則偏視其氣之深淺察其色之躁靜則君子小人皆可辨矣氣長而舒和而不暴者為富夀之人氣促不均暴然見色者為淺細之人醫者謂一呼一吸謂之息凡人一晝一夜計一萬三千五百息觀人之呼吸皆疾徐不同或急者十息或遲者尚未七八而老者肥者太疾而幼者太遲竊恐古人之言猶未盡理也夫氣有發乎顔表之間而為吉凶之兆也其散如毛髮其聚如黍米望之有形而按之無迹茍不精意觀之則吉凶無所據矣氣出入無聲且不自覺或卧不聞者謂龜息夀相也袁天綱相李嶠曰睡則氣從耳出名龜息必貴呼吸氣盛而身動者近死之兆也孟子曰不顧萬鍾之祿能養氣者也爭升合之利悻悻然戾其色暴其氣者亦何足論哉詩曰氣乃形之本察之見賢愚小人多急躁君子則寬舒形須資氣氣資神形氣相資養榖神若更寬和深不暴福如山嶽夀如春月波洞中記同五色得地春要青兮夏要紅冬看黑色喜重重秋間白色乘時旺若不相形見始終色青屬木切須知火紫兼紅赤莫疑金色白兮刑與殺元來水黑土黃推青色氣青雖主憂若得旺時及形體兼有常不變光澤不凝滯者亦吉若在他色中忽然見露者定有憂虞旺在春動在亥卯未絶在申子辰赤色氣赤色氣多撓若形體相應而色潤不焦烈者亦吉如小人暴見一二點四畔有赤色如草根盤旋者終是凶也旺在夏動在寅午戌絶在亥卯未黃紅紫色氣天中庭有此氣色入台輔及敕命如形神不可至此又須推變非可以言傳旺在四季月動在辰戌丑未絶在酉寅已白色氣白主服若本受此色正兼潤澤與形相稱者吉也顯露不常者凶也旺在秋動在巳酉丑絶在寅午戌黑色氣黑色入七竅號為五藏絶如大體均黑者吉若如煙霧四氣騰騰黯黑者大凶此色難辨與青紫多類宜晨興細察之旺在冬動在申子辰絶在巳酉丑九州分域須驗形部隆陷察氣色吉凶定人發祿守土顯迹之地萬無失一然有人難余曰若神禹别九州之前言之如何余對曰方伎流傳在後一身之微稟天地之沖和以其面部分别九州分域不為過矣夫欲觀相先觀其形次認其色若失之毫髮則有差謬今將氣色形圖及九州氣色圖并尅應訣法及生死論詳著附於形部庶幾觀形而察氣色以定吉凶云細微神煞氣十二位神煞者形相吉凶已定却察此部位上何缺陷及氣色浮沉如何仍須辨認去處左右參合以定吉凶也決病死生病人眼有神氣者生氣脫者死矣天柱正目活者生目抵項下者死瘦而不枯瘁者生肥而無血者死有喜容而色正者生悲啼者死舌濡唇者生舌短縮者死風而口禁者生開口者死神光上黃明者生暗者死黑氣如散雲者生聚者死黃紅如浮雲者生黑氣入耳者死氣寬而長者生短氣者死語聲響滑者生短澀者死人中潤澤者生乾枯者死小車上理紋二千石資財巨萬口兩邊有此縱理紋者貧薄之相額上有偃月紋者六百石眉間額上有土字紋者將軍之相又大交紋上及髮際下達兩眉二千石年八十大富貴及益後代子孫榮昌也龍虎角理二千石封侯之相眉中額上有立理者一紋一妻耳門有此三立理者名學道主學道立成眉間有此水字紋者三百石主獄死天中有火字者主客死刑死兵死無田宅之相貧也論言談人之心與物對而反為物之所誘也則情偽百出而寓之於言則其未嘗無悔吝心之所生故言不妄發也必守理焉言不妄陳也必有序焉言中理而有序非貴人則為有道之士故通逹者言顯剛正者言厲簡靜者言寡忠直者言恪謙恭者言遜蔽執者言僻虛誕者言繁躁急者言怨猛勇者言暴諂謏者言媚犴狡者言不盡意毒害者言而含笑好髙則言髙好大則言大言之所主以此驗之其為人者言之泛泛終無成器其言落落終不困滯大凡人言貴乎氣平氣平則言法度言貴乎氣和氣和則言有章制與人之言貴乎有信接人之言貴乎有禮讒言不入耳邪言勿出口聽言觀行審而訂之豫以發言得此道而言決非尋常之流如縱口而言更無利害更無是非又大罔人之言也五事觀相視聽言思貌眉目耳口鼻相云五事俱分明貴為真宰輔寶眼襌師十貴詩頭廣眼長相屬陽精神光彩一般強雖然未至公侯位也合官資到侍郎貴則須還印堂平鳯眼龍睛切要清骨起一條懸膽樣少年科第作公卿貴則氣清似斷筒乍看眼見爍人中又兼凖位連山嶽必定聞名近聖聰四貴無過黃色成更宜骨白主聰明端然日月分明見早早為官播令名五貴人紫色不紅坐來神急定如弓天庭地閣皆豐闊貴則圖名拜侍郎六貴須還部位長印堂瑩靜應三陽坐來迤邐精神足語出丹田播四方七貴須還紫色全眼過魚尾主英賢天中生得成髙廣起眼驚人握重權八貴人黃若病時骨明光彩似琉璃更看魚尾生侵鬢黑白看看入鳯池九貴龍睛龜背分堂堂光彩若精神學堂兩處皆成就不覺公侯值至尊十貴堂堂色蠟黃貴則須饒手膝長龜背額髙明更靜少年科第作員郎上貴神仙相以下並希夷風鑑上貴須要腰背及眉骨天庭三路如爪或入髮際主神遊三清林中精舍在眉上若有勢起是有神風道骨之人主修養好道終遇神仙三尖夫三尖貴者多矣頭尖地閣尖口尖謂之三尖全則主貴不全者頭尖不得父母力也閣尖不得産業力口尖不得夀終力諸般帶殺孤獨煞君看孤獨煞額上有寒毛左見雲煙起呼為煞父刀天羅煞三尖光徹骨浮露號天羅妻子終難保衰亡將奈何暗金煞兩眉尖又逆名號暗金星傷殺臨邉陳權髙敗有成刀劒煞赤脈貫瞳子雙眸看尾尖不惟凶惡死仍恐刑傷兼內姦煞姦門痕癲異黑子更斑斑男女多淫欲雙妻命不還天刑煞左眼一頭破青痕定命刑命乖遭橫禍那解見功名天嶽煞右眼頭邉破名為玉戶開一生安靜坐也解有災來貪叨煞尖鼻曲如鈎叨飱卒未休縱饒君積富終見子孫憂橫亡煞橫亡面四筋逢人却似嗔中年應暴死凶狠纍雙親短命煞唇掀兼齒露舌短見身亡若更咽喉結知君死異鄉孛逆煞耳反兼烏黑名為孛逆郎即宜孤獨坐不解順忠良破敗煞地閣傾還破唇掀破爾家若還聲不潤爭得見榮華
