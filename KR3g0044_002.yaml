body:
  text: 玉管照神局卷中形分十相醜孤夀相孤神貌鬥睛目反輪耳孤眉酒查鼻露齒古孤夀相怒氣口墜輪耳臥蠶眉睡􅋖眼懸膽鼻妍福夀貴相鳯眉腮大鳯眼胡羊鼻四字口性剛清清貴相小鳯眼齊竹鼻一字口鬢清傴孤善夀相龜眼獅子鼻稜角口老孤夀相夀眉龜鳯爪鼻兔耳粗武相有福無夀大鳯眉雄鳯眼鸚武鼻朝口耳鸚武口性剛少武相有衣祿一字眉懸膽鼻小杏眼一字口平垣耳性懦奇賢福夀相入鬢眉連鳯眼齊竹鼻含丹口直性善相鳯眉走輪耳初丹眼齊竹鼻小珠口許負先生云有心無相相逐心生有相無心相隨心滅誠哉是言也自釋云相莫謂我心相莫謂他相乎瑋琳洞中祕密經云伏匿者相生也劉子云腹內有心相離心即是神心神能正直便是福榮人餘同相法入式古今賢聖清漢髙祖隆凖龍顔寬仁愛人李珏日角珠庭唐太宗天日之表龍鳯之姿曾子珠衡犀角古老子身如槁木傅說身如植鰭周公身如斷菑孔子靣若䝉倛方相伊尹靣無鬚麋閎夭靣無見膚秀張良美如婦人李雄目如重雲鼻如龜龍口方如器耳如相望陳平潔如冠玉怪盧杞鬼貌青色龍唇豹首趙方眼望地觀天鬼谷子露齒結喉採桑女臼頭深目端臯陶色如削瓜李白形色秀曜班超豹頭燕頷張飛環眼虎髭異堯眉八彩禹耳參漏項羽重瞳李嶠龜息舜目重瞳文王四乳蒼頡四目王敦豹聲嫩顔淵子山庭日角性聰慧聞一知十終命夭岑文本學堂瑩夷眉過目肉不稱骨非壽兆夫七者如隂陽寒暑能御此者貴不能者賤隂陽寒暑相代取以相成相推取以相生皆本乎造化之妙人之形貌不出乎清古秀怪端異嫩而神氣不能御之不足為美故有形不如有神有骨不如有氣得之者存失之者亡復於山川風土細詳之風土有異閩人不相骨西域不相鼻川不相眼西人不相耳宋人不相口江西人不相色北人不相背魯人不相軒昻太原人不相重厚氣浙人之氣重而不明淮人之氣明而不重南人之氣清而不厚北人之氣厚而不清如此者即其風土也若取此者貴夫神者乃百關之聚秀也察其形氣則知其骨格豐厚也是故人清則骨清何以言之如隂陽清而山川秀茂日月出而天地光明此形氣之著也詩云眉秀平過眼清踈秀出羣更加新月樣名譽四方聞借問何人壽年百耳內生毫眉半白項下雙絛成一條絛者項下餘皮此是人間壽星魄天地之大托日月以為明是日月為萬物之鑑眼乃一身之日月也眼長而深者主壽浮而露大而突圓而怒者促夭凶暴流視者淫濫眊然偏視者為不正之人也赤縷貫睛惡死蛇眼隂毒視定不怯者神壯羊視者愚狠側眼斜視者毒惡亂紋注目多災短小愚賤卓然性凶急轉者小人之相也眼下有卧蠶主福壽生貴子黑白分明貞潔女人眼不要𢃄桃花色即要黑白分明目光兼媚好積德多隂報詩曰女人生𢃄桃花眼花下羅紋細細深此相定知噴水𣪚不用良媒自有親餘與通神鬼眼萬金相及五總龜內同神仙眼相悠然靜淡然止驚之而不瞬不隨語行不因默止此神仙中之人也將相眼相觀如電開視有餘威注睛收視歘然若龍虎才德文武出倫之相人臣得此出入將相名動天下如此者亞於神仙將相有謀之人也鼻象中嶽一靣之表欲得髙隆不要尖小光潤貴吉昏黑貧夭斜曲不直官非纒繞耳主聽貫腦而通於腎為心之司晨腎氣之候也腎氣壯則清而聰虛則昏而濁左為金星右為木星所以主聲譽之信行也耳輪厚堅壽考延年聳起過眉壽算山齊輪廓分明聰悟多能垂珠朝口財食不少貼肉而生富足可言耳內生毫壽數愈髙耳有黑子必生貴子耳門髙濶智慮深逺其堅如木至老不災長而聳祿位厚而圓財食孔而濶官榮紅潤者愈貴黃白者名譽青黑者貧薄輪廓不分明財祿多𣪚薄耳向前賣盡田園其薄如紙貧下早死反而偏側居無田宅左右小大迍否妨害光明潤澤聲名逺播塵昏焦暗貧賤愚鹵大抵貴人有貴眼無貴耳賤人或有貴耳無貴眼夫耳有輪廓耳頭不交兼兩墜垂耳起不側髙如眉更得鼻不昻凖頭齊乃是金木星得力主少年奮發左右耳若及耳頭尖反無垂珠兼耳頭缺鼻不齊主一生困乏作事無成妻兒損尅縱貴亦不長主外死凡眼主視視色為主耳主聽聽聲為本一本又云故眼明有五色之美耳聰有五聲之樂也色莫先乎妻妾聲莫先乎音樂故耳目聰明其有妻妾歌舞之慶乎一本注曰外經云耳形雖善色澤不明未為善詩與五總龜內同人中詩人中深濶最為佳細小橫斜不足誇均大曰深濶如通溝洫水自然流轉福無涯上尖詩人中下濶上頭尖自有清間福祿添下濶曰凖下分明無比並杏仁樣式請君看極小詩人中似線不為竒褊小心腸吝所為如線曰若見欹斜無足取少年必定尅妻兒口為水星所居之地又為心之外户方廣有稜者至貴壽形如角弓者官祿不言自動又如馬口鼠口者讒毁嫉妬狗口貧下口角垂者貪愛紫色多滯口如一撮孤獨貧窮無人獨言者賤唇欲紅不欲黑舌欲赤不欲白餘與前同且如鬢有濃淡有髙低貴人鬢清小人鬢濃鬚黑潤者富貴焦枯者孤貧有屈曲斜直長短踈密一髮一鬚若不似便是他人也詩曰三輔慿君仔細看額髙須得耳門寬學堂三部奚堪是空有文章豈有官鼻梁拱起如懸膽促者中年壽不長地閣滿來田地盛天庭隆濶福彌昌餘與瑋琳洞中祕密經同論心心為五臟之主宅神魂宰視聽形居體內不可得而見也其可見者心之外表也是知心乃神之宫室玉户金關智慧所居也心欲平白寬厚不欲坑陷窄狹寬博者智慮深窄狹者愚而賤心頭生毛其性剛豪心頭骨凸貧窮下劣詩曰心為身主五官三元神所止舍智慮之關寬博平厚榮祿髙遷坑陷窄苦夭盡天年善則福至惡則凶臨又詩曰先觀動靜見心田運智藏神一體先相者但能知外表寬平富貴狹無錢不言不語心機㑹發語無私耿直人最怕心中嗔怒者口唇尖薄性難任骨凸神須躁心寬氣必和深沉言語少終是福來多能孝於親能忠於君為衆德之先衆行之美不得陽貴必獲隂報不在其身必在子孫固可以激薄俗立風化也善相者一本云眼下肉生龍宫福堂黃氣盤旋是隂報之人也所以為先察其德然後相其形故德美形惡無妨為君子形善行惡不免為小人一本又云表正則心端表欹則心曲荀子曰相形不若相心論心不若論擇術此勸人為善也夫形者人之材也德猶器也材既美矣而表之以德猶加之雕琢而成美器遇拙匠而棄之是為不材之器也是知德在形先形居德後也郭林宗觀人有九德一曰容物之德如江河在下物無不容招來虛受浩然不滿也人則升合之量豈能如此二曰樂善之德君子聞人之善則樂善而喜慕之小人聞人之善則惡忌而欲害之也三曰好施之德君子不貪不吝有則與人小人貪鄙好財而未嘗施於人四曰進人之德君子先人而後己小人先己而後人五曰保常之德有常之德慎終如始小人喜怒不常終始多變六曰不妄之德言出諸巳未嘗虛妄小人未嘗有信七曰勤身之德勉勉好善能勤於身不慢不怠小人慢怠而不勤也八曰愛物之德君子視人猶己所以飬羸老而育幼稚也九曰自謙之德君子謙不自居小人則好勝爭先豈能不損詩曰大德如滄海寬和萬物歸保常終不變樂善日知機豈肯為貪鄙何曾說是非粹然和美玉日日發光輝觀子形雖賤誰知德內充天心終護善衣食自豐隆愛物功何博勤身道有容相形先相德此理合神功貴相堂堂神骨清貧容窮貌體常輕要知相物之元本先相心田後相形腹者身之爐冶所以包藏腸胃而化萬物者也欲圓而長厚而堅勢欲垂而下皮欲厚而􅉸故曰腹懸向下富貴主壽腹墜而垂智合天機腹象隂而藏萬物向下則萬物皆聚此所以為貴腹偏而短飯不滿碗皮厚者少疾而富皮薄者多病而貧腹近上者賤而愚腹如抱兒四方聞知背有三甲腹有三壬有之者富而祿紫府真人瑋琳洞中祕密經腹中三甲貴如抱兒名振京師雀腹豺聲貧賤寒人詩曰以腹覘人各有宜腹垂皮厚足豐衣人形一樣無凶吉切見留心仔細推背負三甲人皆貴背薄成坑禍不輕濶長厚者三公相短狹如駝賤又貧餘與瑋琳洞中祕密經五總龜同上停長老吉昌中停長近公王下停長少喜祥三停俱等富貴榮顯三停不均孤夭貧賤五短須要上分長全形入相富文章下停長者人多賤又恐終身少雁行訣曰掌分四時月分要論四季灾福即看四季部位上斷之春得白為鬼主灾夏見黑秋見赤冬見黃皆為相反主凶此氣色之應無有不驗者若青羅貫五指乃細青脉貫滿五指下至夭紋者其人有心腹脾腎之灾身心常若不足又青羅貫指下至人紋名為過關論科名要端正不冲不破不義者縱無好學堂相副亦為俗人僧道者必主有名有權更有學堂必第高科凡看妻位須是定目仔細觀尋其位要豐厚色澤紅潤紋理或雙成字不義不冲破無尅才有吉驗紋散理亂交義冲破不齊散走便主難為妻此訣緊要不可輕與人說若見相生旺相主招賢妻智妾論子息宫此位屬震又為身位其位亦如妻位推之有尅無尅便可見得凡震宫紋細難得子有木紋隂德紋井紋寶暈紋者主貴子大象要緊處依前妻位推之論兄弟宫紋人義出兄弟不吉其位要紋理分明不冲不雜不破不散有魚有井有印有金花好紋者主得兄弟力主有貴兄弟或見虧陷如削坑陷紋亂冲破交義更逢孤辰六害主不得兄弟力才有此紋者生來親者是疏疏者是親陌上人却是親主别自榮立無六親兄弟之力依此斷之萬無失一此乃口訣千金勿傳今録掌法貴賤七十二格及詩訣并録于後明眼君子請詳推之四季紋春青夏赤秋宜白推四時生旺刑尅四季之中黑喜冬以定吉凶之兆秋赤冬黃春見白夏間逢黑總為凶拜相紋拜相紋從乾位尋其紋如琴者昔張其紋好似玉腰琴良有此紋性情敦厚文章異常得君王顧眷深帶印紋掌上紋如帶印形主身帶印前程合主有功名為太師莫言富貴非吾願自有清名作相卿兵符紋兵符紋現掌中央出將入相格漢年少登科仕路長陳平有此相節鉞定應權要職震戎邊徼擁旌幢金花紋紋帶金花印立身主身紋帶金花印男主封侯女作夫此生富貴不憂貧人昔陳平夫人張男兒指日封侯相氏有此紋女子他年國內人雁陳紋朝衙又類雁排行主身或身邊紋生一旦功成姓氏揚者又名朝衙紋昔出入皇都為將相項羽有此紋歸來身帶御爐香雙魚紋雙魚學堂主文章雙魚居放學堂中立身紋透過天庭冠世文章顯祖宗更紅潤主官至節紋過天庭更紅潤度使為官必定至三公六花紋若人有此六花紋六花為侍從之聨他日身霑雨露恩慶來晚節可許為官須侍從慶來晚歲耀朱門懸魚紋懸魚紋襯學堂全立身紋有懸魚主富貴當時正少年貴學堂全少年及一舉鳯池身及第第跨龍作馬玉為鞭四直紋四直可名求四直為公侯之相中年不用愁應在中年須要紅更宜紅潤色潤一旦便封侯獨朝紋獨朝紋出正郎身正郎之相更有靴更逢靴笏更聰明笏紋主貴因官好好難和事必定中年祿位升天印紋天印紋生乾位上生乾位或身位為文章才調自榮華侍從之相為官平步天街上凡庶堆金積滿家寶暈紋寶暈紋竒異相形大手紅潤必主封端如月暈掌中心侯乾黃不好如環定是封侯相錢樣惟多榖與金三日精瑩現掌心三日紋文章異人出凡之文章年少冠儒林相唐李白有之莫訝廣寒高折桂須知才是翰林人金龜紋兊宫西嶽起隆隆在命宫主富貴雙紋似金龜勢象雄行在他位亦好遐算定須過百歲家居金寶更雍容髙扶紋高扶紋出無名指要紅潤富貴之相膽氣剛强難並比也手紅色潤足多