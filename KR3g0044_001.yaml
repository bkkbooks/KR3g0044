body:
  text: 玉管照神局卷上吕洞賓賦相貌有異貴賤不同量肌肉之輕重揣骨格之肥充行似龍騰此相超羣膽智坐如虎踞其人出衆英雄原夫郎郎當當者地閣瘦尖氣氣智智者天庭飽滿鼻梁聳直榖食豐厚山根不折者功名俊美學館清高者凌雲折桂淚堂深陷者眼下也刑妻害子若更持行立正端的忠良更兼雞眼虎睛决明詞理雞眼黃赤是以鼻如鷹嘴喫人心髓齒如石榴為國封侯腦門敦厚者常清貴顴骨尖高者不自由懸壁無路燕腮莫浮結腮機關多金門一字四橫偏多貪啖鐵鎖深關罕用却被拘留金門鐵鎖口也如無腮貪啖拘留八卦也乾額也須壯大欲象蓋盆乾乃天庭欲圓而聳坤若寬停必須朝口地角用朝上也坎口也若清兮足才學唇紅聲亮離冗者常遊走兩顴骨無肉上愛逰走步重一身如奔馬行穿兩腳聊充口巽起三停於外越便使愚癡巽乃兩耳不貼艮若端直而齊豐聰明富有鼻正直而齊也夫何重分次第目下異端有刑害者太陽陷無破敗者面門寬夭夀者則辨其唇掀窮儉者則知其骨寒金匱滿者主有厚祿眼下有肉如橫指者小得大者必有高官眼下重紋眼頭有角妖人邪視偷人低觀賊人眼視地鳯眉象眼營生正易鴨背鵝胸餓死何難人中既現不必須長輪廓雖小且要有氣耳雖小且要白眼眶薄兮清竒穩眼眶寬也鼻若仰兮竅不詳眉若長者唇掀無害面若大者結喉不良任是猴鼠之形終有財糧見他端坐直須高貴多是蛇奔雀步乞丐之輩狗坐蛟騰毒害之徒官殺現以為吏眼肉有赤筋是蘭臺腫以為奴鼻偏面腫多為奴僕栁葉眉齊而有藝了字眉反而定孤却不鼻頭懸膽耳末綴珠女眉垂兮在宦族男額寬兮達帝都豈不識御苑公卿田面本來無異邊塵將帥龍頭必竟無殊莫怪泄盡天機二儀皆能和合四象寧無後先是則富貴不則貧賤更有一百二十部星辰排于面上千金賦神傳氣授精合形生禀隂陽鍾秀之源受水火智心之本才成相貌鑒識權衡凡有清竒先分古怪清則如珠在淵竒則如玉藴石古則萬斛之舟怪若懸巖之檜四般貴格皆在精神因形見心辨人倫之真僞聽聲察色知窮達之愚賢嗟乎齒露唇掀豈京朝之貴宦眉攢口撮非臺諫之公卿鼠目獐頭必竟難登仕路蜂腰燕體如何解作勳臣林泉有碧眼神仙世上無交眉宰相要知富貴定須骨秀神清欲見光華盡是氣明色瑩虎頭龍目武文兼宰相之權仙表星標輔弼作公侯之格龜形鶴體心靈而道德仁賢雀腹豺聲家破而愚頑蠢濁逢災有救顴骨高而福堂明遇險無凶隂隲見而神不露眼深又暴至親而亦必他人邊地豐隆非親而偕同言笑犬形蛇視常懷妬毒之心雞目馬聲每藴凶强之性頭小腦薄浪走他鄉喉結牙踈難招妻子傷乎聞善不善謂金匱之虧盈當憂不憂賴玉堂之朝揖耳輪反薄親祖難招骨少肉多夀數必夭天庭端聳得上貴之提攜地閣淺虧招下人之不足若也面濶神瑩雖氣滯而不貧骨露形偏縱色明而不貴眼澀眉虧遇色衰而亦凶惡貌寒體薄守困窮而見恓惶鳯目龍瞳位三台而居八座龜腮鶴頂遊四海而泛五湖足跛目眇貪毒貪奸頂細神昏無成無立嗚呼貧寒下賤無非胸凸臀高胥役輿臺大抵身粗面細眷屬同心偕老骨氣分明親朋中道分離淚堂深邃齒踈而多是多非口薄而招屯招怨抑夫貴賤夭壽無不造於形神得失榮枯實難逃於氣色陳摶先生風鑑人之生也受氣於水禀形於火水則為精為志火則為神為心精合而後神生神生而後形全形全而後色其是知顯於外者謂之形生於心者謂之神在於血肉者謂之氣在於皮膚者謂之色形之在人有金木水火土之象有飛禽走獸之倫金不嫌方木不嫌瘦水不嫌肥火不嫌尖土不嫌濁似金得金剛毅深似木得木資財阜似水得水文章貴似火得火兵機大似土得上多匱庫似禽者不嫌瘦似獸者不嫌肥禽肥則不飛獸瘦則少力如鸞鳯之形則眉目聳秀與夫形體清瘦如犀虎之象則頭角高聳與夫頤腮豐滿如此之類皆貴矣反此者皆賤矣形之在人木形本瘦其色青瘦則不露青則不浮青瘦則細而實露浮則粗而虛世之論木者但知其瘦取形不知其有粗如松柏之木其本以實其葉愈青謂之細實至如梧桐之木其內本虛其外不牢謂之粗虛然取木之形安可一槩而論哉木之形非在其一有𢃄金者有𢃄水火土者水之形非在其一有𢃄土者有𢃄金火木者火之形非在其一有𢃄水者有𢃄金土木者土之形非在其一有𢃄木者有𢃄水火金者𢃄其相生則吉𢃄其相尅則凶如人之始則瘦此木之形也中則粗是金形也次而肥是水形也其次厚實是土形也始瘦次肥為水生於木次又厚實此木之得土也始若瘦次粗為滯也始瘦次肥厚此為發也庶人進財官員加職木滯土淺為知縣土深為郡守又或面方背厚此為有木有土則作職司或武則止於列職之官文則止於選人是木無土也其在職司之上神之在人欲其深不欲其淺神深則智深神淺則智淺用則開於眼合則收於心近觀則有媚逺觀則有威其瞻視有力其睡臥易醒譬如燈之火其心之分則謂之神其燈之花則謂之神光其四畔之光則謂之魄油乃精也油明而後燈明此謂之著也氣之在神要其堅響清韻而不在乎剛健强鳴其內平則志篤其外舒則氣和有清焉有濁焉有清中之濁有濁中之清若以浙人淮人之氣論之浙人之氣重而不鳴淮人之氣鳴而不重南人之氣清而不厚北人之氣厚而不清陽氣舒而山川秀茂日月出而天地光明此氣之著也色之在人雖在皮膚之上要其實不要其浮欲其聚不欲其散生於五臟之表裏飾於一日之光潤唐舉先生曰光不足為之色人之有得則喜形於外有失則憂存於心有老焉有嫩焉嫩者謂年紀深而𢃄後生之色色老者吉色嫩者凶然相法之中不惟其色之如此者滯凡形嫩者亦如之有三光焉有五澤焉有三暗焉有五枯焉形神者有形有餘而神不足者有神有餘而形不足者形有餘而神不足者初見似威久視而晦神有餘而形不足者初見似晦久視愈明神形俱有餘者識與不識見而恱之神形不足者不必更問令人可惡形與神相照氣與色相扶神全則形全氣全則色全神能留氣氣不能留神氣能留色色不能留氣至於形則載之而已有厚焉有薄焉厚者吉薄者凶世人有遭時得志者其始皆欲有為也及其中則滯末則卒皆由度量淺狹不能容載也牆薄則易頺酒薄則易酸紙薄則易裂人薄則易亡水土薄則不足以致隂雲之附不度己短專談人過侵削人物以為己恩面前說是背後說非不睦親長却奉外人性本輕率佯為沉重改常棄舊忘恩忽人未貴先盈未富先驕未學先滿此大薄矣若此者不惟破相又損其夀殃及子孫然夀之相非在乎形貌恢偉眼目浮凹便言天矣形貌恢偉之人若有時情寬性厚此謂之情氣相附也若度量褊窄此謂心不稱也世之人惟知其眉上兼耳內生毛多壽骨入耳兼人中深長法令分明便言有夀然不知其有所禀也此蓋精氣內實其骨乃從精髓而透出然後毫毛方始生於眉耳法令方始分明人中方始得深長如樹之根本牢實上面方始發生枝葉似油盛燈明精足則身安唐先生曰虎骨龍睛世人皆知其吉結喉露齒世人皆知其凶然而吉者未必為吉凶者未必為凶結喉露齒雖則劣相有時心地吉者又貴矣但利其身不利妻子如三尖五露之人貴者多矣但其神氣深粹皆可取也神氣深粹之人形安體靜不隨語行不隨默止不隨色動不隨色轉安而定詳而雅如此之人皆知分也今之人享富貴而心不足不快者多矣其神氣安靜之人心地空間而所為放心然形氣色之於人有滯者多矣形滯八年則塵埃神滯四年則身硬氣滯三年則心傾色滯一年則神困有隂有陽焉陽者不可𢃄隂隂者不可𢃄陽若男𢃄女相懦而無立女懷男相主失其夫婦人要柔而順男子要剛而正良人之婦有威而少媚娼家之婦有媚而少威然世之相者但觀其面部之多而不究其根本如骨者凡人於眉鼻兩頰之上皆有也在貴人則有從精髓內生出故其骨乃秀而細及貧賤之人則浮於上而粗如顴骨上一位庶人入耳不過有夀不露不過有富至若作監司之人生入兩鬢兩府之人則生入天倉其作太守之人則堆成峯而入兩眼之尾而已至下輔主倉庫奴婢若其地閣濶厚自有倉庫奴婢設使地閣缺陷是無宅可居安有奴婢之軀兼倉庫哉視逺智逺視髙智髙視下智下視斜智毒睛屢轉者殺人或流視迫上迫下此瞻視不常之人不可兼立事矣有天者貴有地者富有人者夀有天有地人事不修是徒有相也陳摶袖裏金妙相法在何方先看骨格次看學堂無學堂者人不貴學堂備者却能成此人定且早馳名若有學堂無骨相雖負文章漫費心一㸃真認得分明識貴人凡相貴須看法不看狀貌與渾身自有神色細嫩者音聲亮重似鐘鳴先聽聲後觀色兩般俱要得神恱恱氣洋洋似有似無在面上神清骨氣兩分明此人必作公卿相氣澄神清狀如醉神氣相合又為貴一品朝中貴人身若未遭逢莫輕視清亦貴濁亦貴真濁真清方始是若還認得濁中清便知貧賤富與貴清怕浮濁怕實更怕骨粗甚無益中肉緊骨又清晚年必定成官職俗中人俗中氣小人似卑真如是男人定作人家奴女人定作人家婢氣充滿骨又橫行坐昏昏似醉人肉緩筋緩加色嫩三十六前是去程只有氣又無神堂堂容貌却雄身尅妻害子離鄉祖縱有衣糧必苦辛足象地頭象天地要厚天要圓天不圓兮日月暗地不厚兮無甘泉行要重步要輕重行兮不要聲早死步纒破二者相逢反為禍人眉怕曲又怕直直者原來看不得曲者多藝却聰明直者妻兒害子息名以遇利以見窮相形骨不改變壞官失職只如此凡帶風塵便為賤名未顯利未榮生得身形似就成此相定知只如此何須廣去問星辰凡人相定有方不見街頭在鋪郎神凛凛貌堂堂地閣承漿更濟鏘色雜神光都不見直饒富貴也尋常陳摶相歌形神色氣雖與美紋理須分色澤勻認取神藏緊緩處其間深淺亦關人古竒怪秀青俊厚七者於身是大綱崖岸須高未能貴精神間暇蓋非常窮寒塵土淺露薄乾汗如粘盡未竒要識貴流非泛有清端秀潤却相宜肥無臃腫何妨事瘦不尫孱將變形肥忌少年肥肉緩瘦雖常定骨稜層形如菜葉知多病面似桃花亦小兒陷口短眉無昆仲頤長異母有兄疑洞𤣥經雜斷歌氣粗切忌精神短骨細偏嫌肉頓生此相少年須得祿五總龜云此相少年須橫殺年過四十屬幽冥人生孤獨問如何頰骨高兮氣不和更如魚尾枯無肉妻子宫中自有魔蛇眼豺聲五總龜作形休締結鵲行鼠竄莫相親非人是已多虛誕美語甜言不是真有形無氣應難發有體無神立見衰笑貌融融仍郁郁自然知不混塵埃張眉立目似金剛一片癡五總龜作粗心不可當若更氣粗形屬火五總龜作面帶火殺人持刃繞村坊眉目分明秀氣生龍瞻虎視步行輕聲音落落高辭簡年少登科有異名人倫風鑑云虎頭燕頷公卿位鴨步鵝形賤且貧豹食狼飱為將帥虎威虎怒握兵權餘同前眉為華蓋眼為星華蓋須高眼貴明地閣朝天城廓穩塵中好好認公卿若遇三尖五露人莫言此相更埃塵有時驛馬連邊地也作兵官與細論形容灑落精神秀舉步雍容氣更和對語言辭能委曲定知年少中高科精神似露還非露骨格如粗又不粗若見此般形相者定知弓矢是亨途五總龜云定知弓矢役官途神垕楊先生神部論照神之法說相之宗看青黃赤白黑而定吉凶察金木水火土而知貴賤是故以頭為主以眼為權頭則五行之首眼則形相太清神鑑云眼則四象之先之先觀頭之方圓察眼之黑白頭圓身必貴眼善心必慈眼豎五總龜云眼竪而性剛太清神鑑云睛藏而性剛睛露而心毒斜觀而妬嫉低視而暗藏性剛强而心必曲氣愚惡而色不和滿面青藍多逢迍否紅黃不雜固遇昌榮黑白色侵憂橫灾之疾病紛紛紫色見福祿以由遲要見尅子害妻必是眼下無肉若有平平而起五總龜云臥蠶平起後嗣相隨子孫福祿相隨眉中心有旋毛兄弟同胞必衆橫眉一字信義愛人欲知奸詐孤貧看他鼻頭尖薄官高位顯凖頭圓似截筒衰困中年定見風門昻露山根位斷僕馬多憂露齒結喉相中大忌丈夫如此骨肉分離女人如斯妨夫絶嗣外忌惡死赤脉侵於白睛貴祿難求只為印堂狹小口尖唇薄此人多是多非印上有紋决定難逃刑罰口角低垂向下固知奸詐便宜欲知貴祿聰明須得眼如㸃漆口如四字唇似朱紅兩角朝于天倉便是公侯之位眉高耳聳官祿榮遷部位學堂須得六處不陷在僧道則千人之上在仕路則位至三公初年水厄之灾但看眉間黑子痣生眼尾中年必主水灾口角黑靨忽生末年更防水厄人肥項短命不久長大凡貴格上流骨脉形神清秀兩眉卓竪立見貧寒氣濁神昏此為下賤斯文簡略灾福易明餘術繁多貴賤莫曉後之學者切在精研目擊道存萬物一本西嶽先生截相法好頭不如好面好面不如好身且要三停相稱五嶽四瀆豐成眉秀眼清人貴印廣名現天庭口似朱丹終富切嫌相侔縱紋口川定主餓死交眉必至愚身羊目蛇睛人毒眉毫耳毫夀星眼下無肉尅子頭偏腦陷妨親且看和尚道士最要貌醜神清眉輕眼輕福薄口小鼻小無恩眼深眉高刑責更嫌赤脉穿睛凶貌急急改節免使橫禍相侵西嶽先生截法相人禍福如神凡相人之法上自髮際下至頦頤玩視其左復窺其右舉止為前瞻視為後故富貴論其眉目貧賤視其頦頤智慧察其皮毛苦樂視其手足眉目踈秀澄徹富貴之人頤頦貴乎豐滿主福厚若淺薄主貧賤皮膚細膩毛髮柔澤主多智手足者身之枝幹若多節近薄者謂之廢材主勞苦手白如玉纎如笋滑如油足方厚乃享樂之人胡僧論玉管相書總要訣夫相者要辨傳許負之遺論得吕公之妙訣觀盈虧有理數便是袁天綱也須向前察使無差假使皇甫鎛亦要靠後閲人多少由我重輕非惟道也光武為王劉先主垂手過膝不枉分三國漢高皇大度美髭所以創四百年之社稷秦檜當朝拜相誰知他眼有夜光堯舜以無為為君蓋有眉分八彩面部分百二十相眉邊按一十三家人不在短長要取身方端正耳不拘大小只要輪廓分明頭上無惡骨男兒怕削却嫌鼠目獐頭偏喜鵝行鴨步為甚許太宗登位蓋有天表鳯姿班超有豹頭燕頷别本作虎頭燕頷果獲封侯張飛有環眼虎髭豈不為將上等之人最要有相論相法中有富相有貴相有賤相有窮相坐時如鎮石行處如浮雲謂之富相額有朝天骨眼中有夜光謂之貴相行如水中鼠形如雨打雞謂之賤相未言先齒笑搖腳坐頻移謂之窮相有清竒古怪之人有氷壺秋水相貌宗之瀟灑號酒仙李白秀曜居翰苑按相法謂之清相如號貴客陳平美丈夫潘安容貌居顯官宋玉當朝為宰相按相法謂之竒淡臺生得醜孟子貌不揚蜀王姊臉帶三拳桑維翰面長尺二按相法中謂之古仲尼頭生窩鬼谷子露齒結喉趙方眼望地觀天採桑女臼頭深目按相法中謂之怪通仙録真宰生育妙無停鼓動元氣開陶鈞禽獸草木賦萬象秀出萬象惟吾民頭圓足方肖天地高挂眼目為星辰面分一百二十部五嶽四瀆相經綸欲知貴賤與貧達仔細銖銖為君說喉音深重聲清圓喘息氣長出丹闕俯然濶步如流水突兀背中聳龜骨纎纎十指虎降龍睛黑眼長神煥發三陽臥蠶如橫指鼻梁聳貫天中發背後接語和身轉位冠人臣作䕫契眼深反視鼻低弱齒細眉攢唇又薄舉足未起身先搖項後無毛額如削接人談論首常低一生窮苦無依托臍須深兮腹須厚胸中平平四字口對人數步不見耳齒白唇紅手如藕三停端厚眉骨起富貴科名還自有聲不要輕須嚴毅心上生毛非逺器頭偏頂陷耳傾側父母位中終有忌睛浮縷赤光射外白日殺人誠可畏心雖剛兮色又嫩一生無成空自奮不富似富老有財此是生來合長運家財巨萬性貪鄙開口欲談聲焦毁勸君用意休讀書名曰蠅聲人不貴我唐佐命房𤣥齡鳯睛龍體誰識真惟有下邳張子房一見愛重還如神龍體形長背體聳口丹背俯皮如鱗虎形眼大項頸短舞鶴不高瘦而真龜形須辨鼻大小鼻小之龜樂山沼優游無事宜僧道只得年高不促夭犀牛膊厚肉須豐望月為儒名早了鼠形似兔誠難測兔則少淫鼠被尅欲知犬豕與蛇雞身上無衣口無食戲猴入相情猜敏膚似凝脂貴無敵獅子眉大頭面圓若得正形真可惜欲向前兮欲向後只在人前似奔走人中垂唾常不乾睫上生眵頻抖擻必知兄弟不得力久久貧窮無所守借問何人年過百耳內生毫眉半白項下雙絛勝一絛此是人間夀星魄偶然遙望形堂堂坐來久視無神光只可居家承父業中年切忌形相傷忽然相見形貌古久視風骨聲琅琅巉岩氣格旋發露有類古獄埋干將先賢曽著聖賢論此說猶宜著意詳一床同睡息不覺不帶蘭麝自微香有人欲識廊廟器漢祖昔日求張良名冠甲科誰氏子額骨稜稜聳雙耳項骨若折眼露睛不過中年須夭死語聲極短面微赤昆仲不才還少力言須端兮語須正莫向人前無的信欲求身計必遲遲富貴早來須殞命為性輕掀不持重愛樂貪歡宜入衆莫教家破身無依往往命乖遭鬼弄皮骨雖竒怎可恃亦須修心理仁義心形相稱福有根不在天機在人事休說形凶必遭辱能行忠孝須增福不然形善心火燒定見淪亡陷刑獄問君此法胡為然所謂貌餘心不足此法憑君細細觀究盡精微莫妄傳突然項後肉粗起雖則為儒性不賢三停上短長腳脛腰硬行來却掉拳唇開涎垂眉壓眼齒露臀高又縮肩口尖兩額旋成窟耳薄無輪向面前可憐相貌多刑尅夭暴孤單遭禍纒眼不拘大小黑白要分明耳不在大小輪廓要重城青藍滿面多凶否色帶微黃必少榮敢問堂堂貌峰聳因甚年來無土耕定知眉蹙山根折不然口小鼻梁橫背薄頭偏喉露結食物欲吞如硬咽縱有衣糧必客死又忌行時如跛鱉瞻前顧後愛傍窺媚眼奸門骨如垤語無緒兮笑無經混亂閨門常不别須要風神有稜崿威重恢諧又端恪雲雷遭遇必有時不坐邦城即臺閣紫紅皮厚發必晚膚薄色黃年少作莫教家內方富豪生得兒郎却輕弱入衆神虛色先喪葉未開兮花已落等間􅙳袒好容儀才被衣冠氣勢低背後談論似風火對面嘉賓無一辭只好居家無橫禍至老無成徒爾為貴人須得凖頭黃口濶藏拳舌又長足下生毛兼黑痣地角豐隆定富強口邊不欲毛粗裂有子應須出外鄉獨臥何緣三度娶閣門枯陷鼻頭昻縱理人中多抱子下尖上廣亦空床掌中橫斷心無智若更無紋必乏糧面細身粗名八極項促形恢忌少亡上長下短公侯相昔日孫權霸一方眉旋成螺終鬭死三甲三壬入老鄉聞君聰慧計百出尿必散兮屎必方言辭在口唇上掀舉步傾危似倒牆眉成八字復蹙額深恐臨終臥路傍難得雙瞳如㸃漆掌散紅紋多貯積位高地閣須豐起富貴無過手垂膝面粗體滑手如綿早入金門受通籍行須重兮步須輕咀嚼凝然不浪鳴俯背端然如坐虎少年濶步上天庭女人眼下肉常枯不殺三夫即兩夫見人掩面笑不斷愛逐行人夜半逋雄聲唇濶面顴聳縱得豐榮亦守孤膝搖背聳須姦蕩手若乾薑却有餘言辭窈窕從夫貴眼似流星口似朱未言先笑腰肢硬相法名為破敗豬額窄唇掀微露齒殺子無夫亦自居眼如明月聲音響溫厚還如掌上珠丈夫女子形皆一賤則浮虛貴則實五短之形並五露此輩人中少儔匹顴骨成峯玉枕高必作朝堂賢輔弼身微聲大隔江聞千里看看騰羽翼驢唇鼠耳并蛇眼謗語姦貪心似螫眉頭直起性剛强面肉橫生心妬嫉試問何者是行尸精乏神光肉似泥人中漸滿唇先縮逺去應無百日期天中黃色如蒸霧下遏山根與凖齊加官授印來須速不過三旬便可知若在山根并地閣色分黃紫喜應遲忽然無事心微動顔色紛紛似醉時雙眸赤暈兼青黑禍至君須細細推脉候莫言無病患隄防須早去尋醫夢中忽與公卿㑹又似承恩到玉墀榮貴欲求心預覺穩穩青雲萬丈梯大凡萬種人之貌精微不可銖銖較先看信行次形神方辨貴人并不肖因攄鄙思作短歌說盡源源無限妙諸家相法少室山人李銓長歌同雜論頭骨欲起額骨欲峻眼則欲長眉乃欲秀髮則欲黑耳乃欲硬鼻乃欲隆口乃欲方法令欲長一作深人中欲長邊庭欲豐蘭臺欲深井竈欲明山根一作林欲厚倉庫欲滿驛馬欲肥井則欲寬聲則欲宏齒則欲白氣則欲寬胸乃欲濶心乃欲平腰乃欲厚體乃欲正皮則欲滑臍則欲深腹則欲垂一作堅手則欲長腳則欲短色則欲明坐欲如山神乃欲清行欲如水小便欲散而疾大便欲方而細水户欲急而滯火户欲垂而深入於此相者不貴而富也額雖廣却尖頤骨雖峻却皮粗耳雖厚鼻梁低眼雖長蹙破眉口雖正聲如嘶背雖隆手如槌粗枝如木槌舌雖紅口如吹如吹火唇雖方齒不齊氣雖清行步欹腰雖厚行如馳如走馬語雖和神如癡眼雖明視東西臥雖靜食淋漓頭雖長折腰肢入此相者名折除善惡相雜也或富則夭或賤則壽或貴則貧或先貴而後賤或先富而後貧宜精理而推之詩曰貌異形殊各有宜元來相法最難知莫教一見知凶吉須更留心仔細推眉粗額窄或聲焦相子形容食不饒借問因何逢祿位奈緣皮滑好身腰問君因甚為官職兩眼精神色不昏惟有一聲臍下出渾然却似甕中間鼻低齒細結喉高腰薄知君命不饒為甚倉惶今已老必須耳內出長毫鼻隆欲厚好腰身耳聳唇方目有明近入中年聞暴死定知頂陷腦成坑進步如雲色又清更兼皮細背隆平忽然暴夭人難覺只為喉乾似鴨聲神枯氣薄色還乾相爾豐隆事且難郤道而今多積穀必然不語寸心寬耳薄唇􅚖目不明此人何事有官榮更看背厚如龜樣又聽聲圓眼秀清印堂低窄又交眉相法無官衆共知不意初年霑祿命中年暴夭死相隨少年不欲大充肥肉重筋寬祿自遲但看朝廷公與相骨隆肉少步如飛相君形貌太粗踈肉緩牙尖眼似珠今已居村家富盛必然腦滿氣寬舒體輕口薄少年郎氣狹神空性有狂今日雖然衣食足莫教父死便乖張只宜帶骨不帶肉莫令肉多骨不足暴亡只為眼無神又怕肩寒筋似束黃白神清氣不同便知祿位少年豐若言赤黑并紅紫食祿中年似合逢神庭不粹色常昏笑語驚狂走是奔莫訝少年衣祿足逡巡禍發鬼臨門又云目為主眉為客眉目俱長如㸃漆富貴不賤格目下一字平所作皆分明目下臥蠶紋當生貴子孫目小終無祿眉粗却主孤目下無肉一子相逐亦主隂毒睛屢轉者多奸詐目尾後有穴如粟米者謂之聰明開口睡命夭滯下唇長貪食忙口薄兩角垂多是被人欺蘭臺起聲譽美鼻高昻主官昌鼻如截官不歇耳輪貼肉金玉滿屋頭尖耳小多苦多腦耳白過面天下欽羡耳高於目合受天祿耳高眉一寸永無貧病困人中淺財命蹇人中短子孫罕人中高厚無夀無後人中深長有夀有郎人中分明性直如神眉毛婆娑兒少女多眉短於目多主頑福眉連休望祿奸妬偷財榖不得强開目多遭橫禍逐眉濃髮厚心賊損夀眉毛平尊貴人眉過於目智過人伏男面要昻女面要方面如黃瓜富貴榮華面上忽黑氣大病明朝至夜半聽聲白日看行語笑面赤不藏事跡語笑面黑心情祕密男雌聲妨婦女雄聲妨夫金骨肉細滑如綿多貴又饒錢木骨瘦而青黑色骨頭粗大多窮厄水骨多頭尖富貴不可言水骨多頭粗無德賤如奴土骨大而粗子繁富有餘富貴在於骨髮喜愛在於容色骨肉緊硬夀而不閒骨多肉少尊上骨少肉多卑下龍行為三公虎步為將軍行而視隂狼貪利女行返回顧淫亂逐人去手臂雖長語須如篁項須粗短足厚須方手掌無紋作賊遭論指如春䓤食祿萬鍾手足如綿榮貴中年指背紋多一生蹉跎臂長好舍臂短好取手如噀血富貴不絶腹如抱兒名振京師臍深廣福祿旺臍兀出命先卒論五應五合何謂五應天庭直起而方正地閣朝揖而圓濶是謂天地相應鼻直起而梁不露面無痕而肉平正是謂天宫相應印堂方正而光明三部等齊而方正是謂天心相應眉目疏秀而有神日月聳直而不粗是謂天機相應耳聳而輪明口方而角起是謂天輪相應何謂五合骨正而有隂陽言正而有剛柔是謂天地相合瞻視穩而聲音清體貌重而行走輕是謂天宫相合氣溫粹而光華色潔淨而無瑕是謂天心相合識見明而機變度量深而寬厚是謂天機相合敬上下而懷忠孝愛親舊而足信義是謂天輪相合或應多合少官崇位寡應少合多譽大官卑應合相稱則兩得矣能以分數增減看之自選人至兩府皆可見之
